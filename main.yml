name: Build Flutter APK
on:
push:
branches: [ main ]
jobs:
build:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v3
- uses: subosito/flutter-action@v2
with:
channel: 'stable'
- run: flutter pub get
- run: flutter build apk --release

) .كزاهج نم ًالدب Build ـلا ةيلمعب يه موقتل GitHub تارفريس مدختسن فوس1
) .كزاهج نم ًالدب Build ـلا ةيلمعب يه موقتل GitHub تارفريس مدختسن فوس2
) .كزاهج نم ًالدب Build ـلا ةيلمعب يه موقتل GitHub تارفريس مدختسن فوس3

- name: Upload APK
uses: actions/upload-artifact@v3
with:
name: release-apk
path: build/app/outputs/flutter-apk/app-release.apk
